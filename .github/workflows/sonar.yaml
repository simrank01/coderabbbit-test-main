name: AI Code Fixer (Controlled)

on:
  # 1. Runs the scan automatically on every push
  push:
    branches: [main]
  # 2. Allows YOU to start the AI Repair manually from the UI
  workflow_dispatch: 

jobs:
  # JOB 1: Just the Inspector
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # JOB 2: The Agent (Only runs if YOU click the button)
  remediate:
    needs: analyze
    if: github.event_name == 'workflow_dispatch' # ONLY runs when you click 'Run Workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Tools
        run: pip install requests google-generativeai
      - name: Run Repair Agent
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_repair.py
      
      # 3. Instead of pushing to main, create a Pull Request
      - name: Create Pull Request for Fixes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI-generated fixes for SonarQube issues"
          title: "🤖 AI Fixes: Recommended Remediation"
          body: "This PR was generated by the AI Agent after analyzing the SonarCloud report. Please review the changes before merging."
          branch: ai-remediation-fixes # Creates a new branch
